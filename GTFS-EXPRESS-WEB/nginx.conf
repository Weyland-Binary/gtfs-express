server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # HTTP security headers — included in every location to avoid Nginx add_header inheritance bug
    include /etc/nginx/security-headers.conf;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Static file caching (Vite emits hashed filenames under /assets/)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # Images caching (30 days)
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        include /etc/nginx/security-headers.conf;
    }

    # index.html must never be cached — it carries hashed asset references
    # that change on every deploy. Stale index.html + new chunks = load error.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include /etc/nginx/security-headers.conf;
    }

    # SPA : all non-static requests should serve index.html for client-side routing
    location / {
        try_files $uri /index.html;
    }

    # Proxy to Express API
    location /api/gtfs/ {
        proxy_pass http://api:3004/gtfs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout for large uploads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 55m;
    }

    # Healthcheck for Docker
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
