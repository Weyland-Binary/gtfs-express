# HTTP security headers — included in every location to avoid Nginx add_header inheritance bug
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# script-src has no 'unsafe-inline': Vite emits only external module scripts
# (CRA's inline runtime chunk is gone). The JSON-LD block in index.html is a
# non-executable data block — script-src does not apply to it.
# style-src keeps 'unsafe-inline' (Emotion/MUI runtime styles + Leaflet).
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; connect-src 'self' https://*.basemaps.cartocdn.com; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none';" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
