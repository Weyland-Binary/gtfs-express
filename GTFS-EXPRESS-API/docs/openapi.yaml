# GTFS Express API — OpenAPI 3.0.3 surface.
#
# Source of truth for the HTTP contract: src/routes/gtfsRoutes.js (mounted
# under /gtfs) plus GET /health (src/app.js). The Jest test
# src/__tests__/openapiCoverage.test.js enforces a strict bijection between
# this file and the router: adding/removing/renaming a route without
# updating this spec fails the suite.
#
# Served at runtime by src/app.js:
#   GET /gtfs/openapi.yaml — this document
#   GET /gtfs/docs         — interactive Swagger UI
openapi: 3.0.3
info:
  title: GTFS Express API
  version: 1.0.0
  description: |-
    Professional GTFS Schedule editor and validator — REST surface of the GTFS Express backend.

    ## Session model

    The API is **session-based**: `POST /gtfs/upload` (or `GET /gtfs/load-sample`) creates an
    isolated, in-memory-style SQLite database under `uploads/{sessionId}/gtfs.db` and returns a
    UUIDv4 `sessionId`. Every subsequent call targets that database through the `X-Session-ID`
    header. There is **no global persistent database**: sessions expire after a TTL (2 h dev / 1 h
    prod) and the server enforces a concurrent-session cap (HTTP 503 beyond it). Work is persisted
    by re-exporting the feed as a GTFS ZIP (`GET /gtfs/edit/export`) or saving a `.gtfsproj`
    snapshot (`GET /gtfs/edit/project/export`).

    ## Validation engine

    Validation is performed by a single engine: the **MobilityData Canonical Validator** (Java JAR,
    embedded in the Docker image). Reports are normalised to the internal shape documented in the
    `ValidationReport` schema; `POST /gtfs/edit/validate.canonical` returns the untouched
    canonical JSON instead. Severity profiles (canonical / strict / lenient / fr-datagouv) only
    override severities — the rule set itself stays aligned with MobilityData.

    ## Edit CRUD pattern

    All `/gtfs/edit/{table}` families (stops, routes, trips, stop_times, calendar, fares v1/v2,
    flex, levels, pathways, transfers, translations, attributions, frequencies…) share one generic
    envelope, documented once and referenced everywhere:

    - `POST /gtfs/edit/{table}` — create. Body: JSON map of GTFS column → value
      (`EntityCreate`). Returns **201** with the created row echoed under a key named after the
      entity.
    - `PATCH /gtfs/edit/{table}/{pk}` — partial update. Body: JSON map restricted to the
      server-side whitelist of editable columns (`EntityPatch`). Returns the full post-image row
      plus the `changed` column list.
    - `DELETE /gtfs/edit/{table}/{pk}` — delete. Returns `{ deleted: "<pk>" }`.
    - `GET /gtfs/edit/{table}` — list.

    Every mutation requires edit mode (`POST /gtfs/edit/enter`, beta-gated), is recorded in the
    session edit log (undo/redo via `/gtfs/edit/undo|redo|jump`), and returns the `EditResult`
    envelope. Sessions not in edit mode are rejected with **409** `SESSION_NOT_IN_EDIT_MODE`.

    ## Servers & proxying

    Direct (development) access is `http://localhost:3004` with paths as documented here. In
    production the frontend reverse proxy exposes the same surface behind the `/api` prefix
    (e.g. `/api/gtfs/agencies`).
  license:
    name: AGPL-3.0-only
    url: https://www.gnu.org/licenses/agpl-3.0.html
servers:
  - url: /
    description: "Direct access (development: http://localhost:3004). In production the API is exposed
      behind the /api prefix by the reverse proxy."
tags:
  - name: Health
    description: Liveness probe.
  - name: Upload
    description: "Feed ingestion: GTFS ZIP upload, demo feed, public upload counters."
  - name: Read
    description: Read-only feed exploration endpoints (HTTP-cached against the session edit counter).
  - name: Diff
    description: Read-only feed-to-feed comparison between two uploaded sessions.
  - name: Search & Stats
    description: Free-text search and aggregated feed statistics.
  - name: Edit Session
    description: "Edit-mode lifecycle: enter (beta-gated), exit, status."
  - name: Edit
    description: Transactional mutations on GTFS tables — generic CRUD envelope, see the Edit CRUD
      pattern section.
  - name: History
    description: Edit log, undo, redo and history jump (backend-driven).
  - name: Validation
    description: On-demand canonical validation, profiles, locales and the rule catalogue.
  - name: Quick Fixes
    description: Auto-repair proposals derived from the validation report.
  - name: SQL
    description: "SQL console: read-only public surface plus the edit-mode mutation surface."
  - name: AI
    description: NL2SQL one-shot generation and multi-turn chat (Anthropic Claude, beta-gated, read-only).
  - name: Project
    description: ".gtfsproj disk persistence: save, open, metadata."
  - name: Export
    description: Re-export the (edited) feed as a GTFS ZIP.
  - name: Admin
    description: Operator dashboard endpoints, gated by X-Admin-Token.
  - name: Config
    description: Public feature flags.
paths:
  /health:
    get:
      tags:
        - Health
      summary: Liveness probe (no session required).
      security: []
      responses:
        "200":
          description: Service is up.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  uptime:
                    type: number
                    description: Process uptime in seconds.
  /gtfs/upload:
    post:
      tags:
        - Upload
      summary: Upload a GTFS ZIP and create an isolated session (SQLite DB).
      description: Validates the archive (canonical MobilityData engine), migrates it to a per-session
        SQLite database and returns the session ID to use in `X-Session-ID`. If the header carries
        an existing session ID, the session content is replaced (any open edit session is dropped).
        Rate-limited per IP.
      requestBody:
        $ref: "#/components/requestBodies/GtfsZipUpload"
      security: []
      responses:
        "200":
          $ref: "#/components/responses/UploadOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/SessionSaturated"
  /gtfs/load-sample:
    get:
      tags:
        - Upload
      summary: Load the bundled demo GTFS feed into a new session.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/UploadOk"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/SessionSaturated"
  /gtfs/agencies:
    get:
      tags:
        - Read
      summary: List all agencies of the session feed.
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/routes/{agency_id}:
    get:
      tags:
        - Read
      summary: List routes operated by an agency.
      parameters:
        - name: agency_id
          in: path
          required: true
          schema:
            type: string
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/directions/{route_id}/{date}:
    get:
      tags:
        - Read
      summary: List directions served by a route on a given date.
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
        - name: date
          in: path
          required: true
          schema:
            type: string
          description: Service date in YYYYMMDD format.
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/stops_and_times/{route_id}/{direction_id}/{date}:
    get:
      tags:
        - Read
      summary: Stop-by-trip departure time grid for a route, direction and date.
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
        - name: direction_id
          in: path
          required: true
          schema:
            type: integer
        - name: date
          in: path
          required: true
          schema:
            type: string
          description: Service date in YYYYMMDD format.
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/stops/all:
    get:
      tags:
        - Read
      summary: List every stop in the feed.
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/shapes/{route_id}/{direction_id}:
    get:
      tags:
        - Read
      summary: Shape polylines for a route and direction.
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
        - name: direction_id
          in: path
          required: true
          schema:
            type: integer
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/calendar/{route_id}:
    get:
      tags:
        - Read
      summary: Calendar rows attached to a route.
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/calendar_dates/{route_id}:
    get:
      tags:
        - Read
      summary: Calendar date exceptions attached to a route.
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/calendar_service/{service_id}:
    get:
      tags:
        - Read
      summary: Calendar row for a service_id.
      parameters:
        - name: service_id
          in: path
          required: true
          schema:
            type: string
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/calendar_dates_service/{service_id}:
    get:
      tags:
        - Read
      summary: Calendar date exceptions for a service_id.
      parameters:
        - name: service_id
          in: path
          required: true
          schema:
            type: string
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/average_trip_times:
    get:
      tags:
        - Search & Stats
      summary: Average trip duration per route.
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/statistics:
    get:
      tags:
        - Search & Stats
      summary: Aggregated feed statistics (entity counts, service span, frequencies).
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/all_shapes:
    get:
      tags:
        - Read
      summary: Every shape of the feed (map overview).
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/shapes_for_route/{route_id}:
    get:
      tags:
        - Read
      summary: Shapes referenced by the trips of a route.
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/upload-stats:
    get:
      tags:
        - Upload
      summary: Public aggregate upload statistics.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
  /gtfs/admin/stats:
    get:
      tags:
        - Admin
      summary: Aggregated usage statistics for the dashboard (30 s TTL cache).
      security:
        - AdminToken: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/admin/ping:
    get:
      tags:
        - Admin
      summary: Lightweight admin-token validation ping.
      security:
        - AdminToken: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/admin/ai-usage:
    get:
      tags:
        - Admin
      summary: Live AI cost-limiter counters (hourly / daily windows).
      security:
        - AdminToken: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/admin/active:
    get:
      tags:
        - Admin
      summary: Live active-session counter.
      security:
        - AdminToken: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/admin/sessions:
    get:
      tags:
        - Admin
      summary: Per-session details (agency, entity counts, validation summary).
      security:
        - AdminToken: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/admin/perf/sample:
    get:
      tags:
        - Admin
      summary: Live P50/P95/P99 latency per matched route.
      security:
        - AdminToken: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/admin/perf/reset:
    post:
      tags:
        - Admin
      summary: Reset the perf-stats ring buffers.
      security:
        - AdminToken: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/admin/stats/reset:
    post:
      tags:
        - Admin
      summary: Archive telemetry logs and reset stats counters.
      security:
        - AdminToken: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/stop_detail/{stop_id}:
    get:
      tags:
        - Read
      summary: Detailed stop record with related routes and trips.
      parameters:
        - name: stop_id
          in: path
          required: true
          schema:
            type: string
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/route_detail/{route_id}:
    get:
      tags:
        - Read
      summary: Detailed route record with trips, shapes and calendars.
      parameters:
        - name: route_id
          in: path
          required: true
          schema:
            type: string
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/trip_detail/{trip_id}:
    get:
      tags:
        - Read
      summary: Detailed trip record with its stop_times.
      parameters:
        - name: trip_id
          in: path
          required: true
          schema:
            type: string
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/shape_detail/{shape_id}:
    get:
      tags:
        - Read
      summary: Detailed shape record (ordered point list).
      parameters:
        - name: shape_id
          in: path
          required: true
          schema:
            type: string
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/search:
    get:
      tags:
        - Search & Stats
      summary: Search stops, routes, trips and shapes by free text.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search text (case-insensitive).
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/diff:
    post:
      tags:
        - Diff
      summary: Compare the session feed against another uploaded session.
      description: >
        Read-only feed-to-feed comparison. The base feed is the caller's
        session (X-Session-ID); the comparison target is another uploaded
        session referenced by `otherSessionId` ("after" side). Returns
        per-table added/removed/changed counts plus up to `sampleLimit`
        example rows per category; tables with a surrogate primary key are
        compared by full row content and only report added/removed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otherSessionId]
              properties:
                otherSessionId:
                  type: string
                  format: uuid
                  description: Session id of the feed to compare against.
      security:
        - SessionId: []
      responses:
        "200":
          description: Per-table diff with summary counts and bounded samples.
          content:
            application/json:
              schema:
                type: object
                properties:
                  base: { type: string, format: uuid }
                  other: { type: string, format: uuid }
                  sampleLimit: { type: integer }
                  summary:
                    type: object
                    properties:
                      added: { type: integer }
                      removed: { type: integer }
                      changed: { type: integer }
                      tablesWithChanges: { type: integer }
                  tables:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        keyed: { type: boolean }
                        added: { type: integer }
                        removed: { type: integer }
                        changed: { type: integer }
                        samples: { type: object }
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /gtfs/sql:
    post:
      tags:
        - SQL
      summary: Run a read-only SQL query (SELECT / WITH / EXPLAIN / read-only PRAGMA).
      requestBody:
        $ref: "#/components/requestBodies/SqlQuery"
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/SqlOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/EditModeRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
  /gtfs/sql/export.csv:
    post:
      tags:
        - SQL
      summary: Stream a read-only SQL result as CSV (bypasses the 10k-row UI cap).
      requestBody:
        $ref: "#/components/requestBodies/SqlQuery"
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/CsvOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"
  /gtfs/sql/schema:
    get:
      tags:
        - SQL
      summary: SQLite schema introspection for the SQL console (read mode).
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
  /gtfs/sql/nl2sql:
    post:
      tags:
        - AI
      summary: Generate a SQL query from a natural-language prompt (Claude, beta-gated).
      description: One-shot NL2SQL. The generated SQL is returned for review — never executed server-side.
        Kill-switched via `NL2SQL_ENABLED` (503 when off).
      requestBody:
        $ref: "#/components/requestBodies/NlPrompt"
      security:
        - SessionId: []
          BetaCode: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "403":
          $ref: "#/components/responses/EditModeRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/SessionSaturated"
  /gtfs/sql/nl2sql-chat:
    post:
      tags:
        - AI
      summary: Multi-turn NL2SQL chat assistant (Server-Sent Events stream, beta-gated with anonymous free trial).
      description: Conversational repair companion. A valid `X-Beta-Code` grants full access; anonymous
        sessions get a small free-trial allowance (`NL2SQL_FREE_MESSAGES_PER_SESSION`, typed 403
        `FREE_QUOTA_EXHAUSTED` once spent). Model-generated mutations are never executed by this
        endpoint — they are surfaced as `sql_blocked` drafts the guided RepairFlow applies through
        the regular `/gtfs/edit/sql` pipeline. Kill-switched via `NL2SQL_CHAT_ENABLED` (503 when
        off). Pre-stream errors return JSON envelopes.
      requestBody:
        $ref: "#/components/requestBodies/ChatTurn"
      security:
        - SessionId: []
          BetaCode: []
      responses:
        "200":
          $ref: "#/components/responses/SseOk"
        "403":
          $ref: "#/components/responses/EditModeRequired"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/SessionSaturated"
  /gtfs/sql/nl2sql-chat/feedback:
    post:
      tags:
        - AI
      summary: Thumbs up/down on an assistant chat turn (quota-free telemetry).
      description: Appends a feedback record (turnId + rating "up"|"down") to the chat usage log and
        records a `chat.feedback` event. Session-gated; never consumes free-trial or AI quota.
      security:
        - SessionId: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
        "400":
          $ref: "#/components/responses/BadRequest"
  /gtfs/config/features:
    get:
      tags:
        - Config
      summary: Public feature flags (NL2SQL / chat availability) consumed at frontend boot.
      security: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
  /gtfs/edit/enter:
    post:
      tags:
        - Edit Session
      summary: Enter edit mode for the session (beta-gated).
      security:
        - SessionId: []
          BetaCode: []
      responses:
        "200":
          $ref: "#/components/responses/OkJson"
