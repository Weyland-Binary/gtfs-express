components:
  securitySchemes:
    SessionId:
      type: apiKey
      in: header
      name: X-Session-ID
      description: UUIDv4 returned by POST /gtfs/upload or GET /gtfs/load-sample. Required by every
        session-scoped route; strictly validated server-side (path-traversal guard).
    BetaCode:
      type: apiKey
      in: header
      name: X-Beta-Code
      description: Beta access code. Required by edit-mode entry, project import and AI routes while the
        beta gate is enabled (no-op when BETA_GATE_DISABLED=true).
    AdminToken:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: Operator token (ADMIN_TOKEN env var) for the /gtfs/admin/* dashboard endpoints.
  responses:
    OkJson:
      description: Successful JSON response.
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    EditOk:
      description: Mutation applied and logged in the session edit history.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EditResult"
    EditCreated:
      description: Record created and logged in the session edit history.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EditResult"
    UploadOk:
      description: "Feed ingested: session created (or replaced) and validated."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/UploadResult"
    ValidationOk:
      description: Validation report in the normalised internal shape.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationReport"
    HistoryOk:
      description: Edit-log entries, most recent first.
      content:
        application/json:
          schema:
            type: object
            properties:
              history:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"
    SqlOk:
      description: SQL result set (rows are capped server-side; `truncated` flags the cut).
      content:
        application/json:
          schema:
            type: object
            properties:
              columns:
                type: array
                items:
                  type: string
              rows:
                type: array
                items:
                  type: object
                  additionalProperties: true
              rowCount:
                type: integer
              truncated:
                type: boolean
            additionalProperties: true
    CsvOk:
      description: CSV stream.
      content:
        text/csv:
          schema:
            type: string
    ZipOk:
      description: GTFS ZIP archive.
      content:
        application/zip:
          schema:
            type: string
            format: binary
    SqliteOk:
      description: Self-contained SQLite project file (.gtfsproj).
      content:
        application/octet-stream:
          schema:
            type: string
            format: binary
    SseOk:
      description: Server-Sent Events stream (token, sql_blocked, done… events).
      content:
        text/event-stream:
          schema:
            type: string
    HtmlOk:
      description: Human-readable HTML page.
      content:
        text/html:
          schema:
            type: string
    BadRequest:
      description: "Invalid input: missing/invalid X-Session-ID, validation failure, or malformed body."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Invalid admin token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    EditModeRequired:
      description: Rejected by an access guard. Returned as 403 when the beta gate denies the X-Beta-Code
        or a mutation is attempted on the read-only SQL surface; edit handlers reject sessions that
        are not in edit mode with 409 and code SESSION_NOT_IN_EDIT_MODE.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Session, feed or record not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Rate limit exceeded (global, upload, SQL, revalidation or beta-gate limiter).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    SessionSaturated:
      description: "Service unavailable: concurrent-session cap reached, the validation engine is
        unavailable, or the requested server-side feature is disabled (NL2SQL kill-switch, admin
        token unset)."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  requestBodies:
    EntityCreate:
      description: JSON map of GTFS column names to values for the new record (spec field names, e.g.
        stop_id, stop_name, stop_lat…). Unknown columns are rejected by the server-side whitelist.
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    EntityPatch:
      description: Partial JSON map of GTFS column names to values. Only whitelisted editable columns are
        applied; primary-key mutation is forbidden.
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    SqlQuery:
      description: SQL statement to execute against the session database.
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - sql
            properties:
              sql:
                type: string
                example: SELECT route_id, route_long_name FROM routes LIMIT 50
            additionalProperties: true
    NlPrompt:
      description: Natural-language request to translate into SQL.
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - prompt
            properties:
              prompt:
                type: string
                example: List the 10 stops with the most departures
            additionalProperties: true
    ChatTurn:
      description: "Chat turn: user message plus prior conversation context."
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              history:
                type: array
                items:
                  type: object
                  additionalProperties: true
            additionalProperties: true
    QuickFixRequest:
      description: "Quick-fix selector: the rule code to repair (plus optional scoping fields)."
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - rule
            properties:
              rule:
                type: string
                example: missing_stop_name
            additionalProperties: true
    GtfsZipUpload:
      description: Multipart form upload with the GTFS archive under the `gtfsZip` field (max 50 MB, max
        50 entries).
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - gtfsZip
            properties:
              gtfsZip:
                type: string
                format: binary
    GtfsProjUpload:
      description: Multipart form upload with the .gtfsproj SQLite snapshot.
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              project:
                type: string
                format: binary
  schemas:
    Error:
      type: object
      description: Standard error envelope. `message`, `code` and `details` are present on a subset of
        endpoints.
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error (or machine code on gate endpoints).
        message:
          type: string
          description: Optional human-readable detail.
        code:
          type: string
          description: Optional machine-readable code (e.g. SESSION_NOT_IN_EDIT_MODE).
        details:
          type: array
          items: {}
          description: Optional structured validation violations.
    EditResult:
      type: object
      description: "Envelope returned by every edit mutation. The mutated row is echoed under a key named
        after the entity (e.g. `stop`, `route`, `trip`); updates add the `changed` column list,
        deletes return the primary key under `deleted`. The `validation` envelope is always present
        and currently always `skipped: true` — full canonical validation runs on demand via POST
        /gtfs/edit/validate."
      properties:
        changed:
          type: array
          items:
            type: string
          description: Columns actually modified (updates only).
        deleted:
          type: string
          description: Primary key of the removed record (deletes only).
        validation:
          type: object
          description: Per-edit incremental validation envelope (skipped under the canonical-only engine).
          properties:
            items:
              type: array
              items:
                type: object
                additionalProperties: true
            skipped:
              type: boolean
            reason:
              type: string
              example: incremental_validation_disabled_canonical_only
            elapsedMs:
              type: number
            truncated:
              type: integer
            totalAvailable:
              type: integer
      additionalProperties: true
    ValidationFinding:
      type: object
      description: A single validator finding, normalised from the MobilityData canonical report.
      properties:
        ruleCode:
          type: string
          description: Rule code from the rules.json catalogue.
        severity:
          type: string
          enum:
            - error
            - warning
            - info
        message:
          type: string
      additionalProperties: true
    ValidationReport:
      type: object
      description: Normalised validation report produced by the canonical-validator adapter.
      properties:
        valid:
          type: boolean
          description: True when no error-severity finding remains after profile overrides.
        errors:
          type: object
          description: Findings grouped by GTFS file name (e.g. `stops.txt`).
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/ValidationFinding"
        counts:
          type: object
          properties:
            errors:
              type: integer
            warnings:
              type: integer
            infos:
              type: integer
        profile:
          type: string
          example: canonical
        engine:
          type: string
          example: mobilitydata-canonical
    UploadResult:
      type: object
      description: Response of POST /gtfs/upload and GET /gtfs/load-sample.
      properties:
        sessionId:
          type: string
          format: uuid
          description: Session ID to send back in X-Session-ID.
        valid:
          type: boolean
        validationReport:
          $ref: "#/components/schemas/ValidationReport"
        migration_ms:
          type: number
          description: CSV → SQLite migration duration.
        editSessionDropped:
          type: boolean
          description: "Upload only: true when re-uploading over a session that had an open edit DB."
        pendingEditsLost:
          type: integer
          description: "Upload only: count of pending edits discarded by the re-upload."
        meta:
          type: object
          properties:
            bomStripped:
              type: array
              items:
                type: string
            encodingFallbacks:
              type: array
              items:
                type: string
    HistoryEntry:
      type: object
      description: One row of the session `_edit_log` (undo/redo journal).
      properties:
        id:
          type: integer
        ts:
          type: string
          description: Timestamp of the edit.
        entity:
          type: string
          example: stop
        entity_id:
          type: string
        action:
          type: string
          example: update
        description:
          type: string
        undone:
          type: integer
          enum:
            - 0
            - 1
          description: 1 when the edit is currently undone.
